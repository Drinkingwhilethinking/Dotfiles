# 🔤 Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.5

# 🖤 Background & Foreground
background #0d1117 
foreground #c9d1d9

# 🔳 Cursor
cursor           #ff6b9a   # main pink-red accent
cursor_text_color background

# 🌫️ Transparency
background_opacity 0.90

# 🔴 Selection
selection_background #ff5c8a   # soft red-pink highlight
selection_foreground #ffffff

# 🌸 Borders (subtle but aesthetic)
active_border_color   #ff6b9a   # glowing pink border
inactive_border_color #3a2630   # muted pink-grey

# 🎨 Color Palette (red + pink aesthetic)

color0  #16161a   # deep dark base (slightly warmer)
color1  #ff5c8a   # soft red-pink (errors ❤️)
color2  #4fd6a7   # mint green (kept for contrast)
color3  #f1a66a   # warm peach yellow
color4  #ff6b9a   # main accent (pink-red 🌸🔥)
color5  #d89cff   # soft lavender (kept, fits pink vibe)
color6  #ff9eb5   # light pink (replacing cyan)
color7  #c9b6c2   # warm grey-pink

color8  #2a1f26   # dark pinkish grey
color9  #ff5c8a
color10 #4fd6a7
color11 #f1a66a
color12 #ff85a8   # brighter pink accent
color13 #e6b3ff
color14 #ffb3c7   # soft pastel pink
color15 #ffeef5   # warm near-white

# 🧼 Window padding (breathing space)
window_padding_width 10

# ✨ Smooth scrolling
scrollback_lines 10000

# 🚫 Disable annoying bell
enable_audio_bell no

cursor_trail 1
