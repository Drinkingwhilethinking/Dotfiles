# ~/.config/hypr/hyprlock.conf

general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
}

background {
    monitor =
    color = rgba(0, 0, 0, 0.9)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 80
    color = rgba(255, 255, 255, 1.0)
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.8)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>
    position = 0, -80
    halign = center
    valign = center
}
